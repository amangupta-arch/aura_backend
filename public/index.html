<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aura — Upload Your 6 Photos</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Upload your photos</h1>
        <p class="sub">
          Drop one image into each slot below. Your files go to our Google Drive
          and the six links get saved against your anonymous ID.
        </p>
      </header>

      <form id="upload-form">
        <div class="grid">
          <section>
            <h2>Face</h2>
            <div class="slots">
              <label class="slot">
                <span class="slot-title">Front face</span>
                <input type="file" name="front_face" accept="image/*" required />
                <span class="preview"></span>
              </label>
              <label class="slot">
                <span class="slot-title">Left face</span>
                <input type="file" name="left_face" accept="image/*" required />
                <span class="preview"></span>
              </label>
              <label class="slot">
                <span class="slot-title">Right face</span>
                <input type="file" name="right_face" accept="image/*" required />
                <span class="preview"></span>
              </label>
            </div>
          </section>

          <section>
            <h2>Body</h2>
            <div class="slots">
              <label class="slot">
                <span class="slot-title">Front body</span>
                <input type="file" name="front_body" accept="image/*" required />
                <span class="preview"></span>
              </label>
              <label class="slot">
                <span class="slot-title">Left body</span>
                <input type="file" name="left_body" accept="image/*" required />
                <span class="preview"></span>
              </label>
              <label class="slot">
                <span class="slot-title">Right body</span>
                <input type="file" name="right_body" accept="image/*" required />
                <span class="preview"></span>
              </label>
            </div>
          </section>
        </div>

        <div class="actions">
          <div class="id-row">
            <span>Your anonymous ID</span>
            <code id="user-id">—</code>
          </div>
          <button id="submit-btn" type="submit">Upload all six</button>
        </div>
      </form>

      <div id="status" class="status" hidden></div>
      <div id="results" class="results" hidden></div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
