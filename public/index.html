<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aura — Upload Your 6 Photos</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Upload your photos</h1>
        <p class="sub">
          Tap a slot on mobile to open the camera and capture the photo
          (on desktop it opens the file picker). Max 4&nbsp;MB per image.
          Your six photos are saved against your anonymous ID.
        </p>
        <div id="demo-banner" class="banner" hidden></div>
      </header>

      <form id="upload-form">
        <div class="grid">
          <section>
            <h2>Face</h2>
            <div class="slots">
              <label class="slot">
                <span class="slot-title">Front face</span>
                <input type="file" name="front_face" accept="image/*" capture="user" required />
                <span class="preview"></span>
              </label>
              <label class="slot">
                <span class="slot-title">Left face</span>
                <input type="file" name="left_face" accept="image/*" capture="user" required />
                <span class="preview"></span>
              </label>
              <label class="slot">
                <span class="slot-title">Right face</span>
                <input type="file" name="right_face" accept="image/*" capture="user" required />
                <span class="preview"></span>
              </label>
            </div>
          </section>

          <section>
            <h2>Body</h2>
            <div class="slots">
              <label class="slot">
                <span class="slot-title">Front body</span>
                <input type="file" name="front_body" accept="image/*" capture="environment" required />
                <span class="preview"></span>
              </label>
              <label class="slot">
                <span class="slot-title">Left body</span>
                <input type="file" name="left_body" accept="image/*" capture="environment" required />
                <span class="preview"></span>
              </label>
              <label class="slot">
                <span class="slot-title">Right body</span>
                <input type="file" name="right_body" accept="image/*" capture="environment" required />
                <span class="preview"></span>
              </label>
            </div>
          </section>
        </div>

        <div class="actions">
          <div class="id-row">
            <span>Your anonymous ID</span>
            <code id="user-id">—</code>
          </div>
          <button id="submit-btn" type="submit">Upload all six</button>
        </div>
      </form>

      <div id="status" class="status" hidden></div>
    </main>

    <div id="success-modal" class="modal" hidden aria-hidden="true" role="dialog" aria-labelledby="success-title">
      <div class="modal-card">
        <div class="modal-check" aria-hidden="true">&#10003;</div>
        <h2 id="success-title">Upload successful</h2>
        <p>Your six photos have been saved.</p>
        <button id="new-upload-btn" type="button">NEW UPLOAD</button>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
